spring.application.name=taskflow

# H2 in-memory for development (Oracle-compatible mode)
spring.datasource.url=jdbc:h2:mem:taskflow;MODE=Oracle;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

# Disable schema.sql auto-execution (Hibernate ddl-auto handles it)
spring.sql.init.mode=never
