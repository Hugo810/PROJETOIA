# ============================================
# Configuração PostgreSQL 17 - TaskFlow
# ============================================

spring.application.name=taskflow

# Configuração do DataSource PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/datatarefas
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=123456

# Configuração JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuração do PostgreSQL
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.type.preferred_instant_type=TIMESTAMP

# Schema initialization (Flyway ou init manual)
spring.sql.init.mode=never

# Server
server.port=8080

# Logging para debug
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
