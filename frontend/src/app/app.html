<div class="app-layout">
  @if (isLogado) {
    <nav class="topbar">
      <div class="topbar-left">
        <a class="brand" routerLink="/">TaskFlow</a>
        <a class="nav-link" routerLink="/">Tarefas</a>
        <a class="nav-link" routerLink="/categorias">Categorias</a>
        <a class="nav-link" routerLink="/usuarios">Usuários</a>
      </div>
      <div class="topbar-right">
        <span class="user-badge">{{ nome }} ({{ roleLabel }})</span>
        <button class="btn-logout" (click)="logout()">Sair</button>
      </div>
    </nav>
  }
  <main class="app-content">
    <router-outlet />
  </main>
</div>
