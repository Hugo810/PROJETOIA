<div class="container">
  <h1>Exportar & Importar</h1>

  <section class="section">
    <h2>Exportar Tarefas</h2>
    <p class="desc">Baixe todas as tarefas no formato desejado.</p>
    <div class="btn-group">
      <button class="btn btn-primary" (click)="exportarCSV()">📄 Exportar CSV</button>
      <button class="btn btn-secondary" (click)="exportarJSON()">📋 Exportar JSON</button>
      <button class="btn btn-calendar" (click)="exportarICS()">📅 Exportar iCalendar</button>
    </div>
  </section>

  <section class="section">
    <h2>Importar Tarefas</h2>
    <p class="desc">Importe tarefas a partir de um arquivo CSV ou JSON.</p>
    <label class="file-label">
      <input type="file" accept=".csv,.json" (change)="onFileSelected($event)" #fileInput>
      <span class="file-btn">{{ importando ? 'Importando...' : 'Selecionar arquivo' }}</span>
    </label>

    @if (mensagem) {
      <div class="msg success">{{ mensagem }}</div>
    }
    @if (erro) {
      <div class="msg error">{{ erro }}</div>
    }
  </section>
</div>
