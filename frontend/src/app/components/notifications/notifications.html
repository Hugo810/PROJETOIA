<div class="notifications-wrapper">
  <button class="bell-btn" (click)="toggle()" title="Notificações">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    @if (naoLidas > 0) {
      <span class="badge">{{ naoLidas > 9 ? '9+' : naoLidas }}</span>
    }
  </button>

  @if (aberto) {
    <div class="dropdown-overlay" (click)="fechar()"></div>
    <div class="dropdown">
      <div class="dropdown-header">
        <h4>Notificações</h4>
        @if (naoLidas > 0) {
          <button class="btn-mark-all" (click)="marcarTodasLidas()">Marcar todas como lidas</button>
        }
      </div>
      <div class="dropdown-body">
        @if (notificacoes.length === 0) {
          <div class="empty">Nenhuma notificação.</div>
        }
        @for (n of notificacoes; track n.id) {
          <div class="notif-item" [class.nao-lida]="!n.lida" (click)="marcarLida(n)">
            <div class="notif-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path [attr.d]="getIcone(n.tipo)"/>
              </svg>
            </div>
            <div class="notif-content">
              <span class="notif-text">{{ n.mensagem }}</span>
              <span class="notif-time">{{ formatarData(n.dataCriacao) }}</span>
            </div>
            @if (!n.lida) {
              <span class="notif-dot"></span>
            }
          </div>
        }
      </div>
    </div>
  }
</div>
